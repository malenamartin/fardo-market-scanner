name: Daily Market Scanner

on:
  schedule:
    - cron: '0 8 * * *'  # Ejecuta todos los días a las 8:00 AM UTC
  workflow_dispatch:     # Permite ejecutarlo manualmente

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scanner
      run: python market_scanner.py

    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: Actualización automática del reporte de mercado"
        file_pattern: reporte_mercado*.txt
        commit_user_name: Fardo Bot
        commit_user_email: bot@fardo.com
